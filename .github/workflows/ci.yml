name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run pytest -q
      - name: Build live index
        run: uv run anydocs-build
      - name: Gate retrieval quality
        run: uv run python scripts/eval_search.py --verbose
