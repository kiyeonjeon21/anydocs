id: codex
title: OpenAI Codex
tags: [coding-agent, openai]
strategy: llms-txt
entry: https://learn.chatgpt.com/llms.txt
# The llms.txt links canonical developers.openai.com pages, but their `.md`
# redirects are lossy for root and moved pages (`overview.md` -> `docs.md`). The
# actual markdown twins consistently live at learn.chatgpt.com/docs/<path>.md.
base_url: https://developers.openai.com/codex/
fetch_base_url: https://learn.chatgpt.com/docs/
# The index opens with a "Documentation sets" group linking to whole-corpus
# exports rather than pages; those would be indexed as one giant duplicate page.
exclude:
  - "*/llms-full.txt"
  - "*/codex-manual.md"
# The live site does not collapse dash runs (Privacy & data -> privacy--data).
slug_style: verbatim
# ...and the bodies cross-reference each other under that same second host, so
# the link graph needs to know it is an alias for base_url. Without this line
# Codex's 600 internal links all look external and it has no graph at all.
link_bases:
  - https://learn.chatgpt.com/docs/
expect_pages: 128
